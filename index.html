<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Skyline-like DPS Meter</title>
<style>
/* ===== Global ===== */
* {
    box-sizing: border-box;
}
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #ffffff;
    font-size: 12px;
}

/* ===== Root container ===== */
#root {
    position: relative;
    width: 220px;
    padding: 4px 6px;
    background: rgba(10, 10, 10, 0.6);
}

/* ===== Encounter header ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
    font-size: 11px;
    color: #e5e5e5;
}
.header-left {
    font-weight: 600;
}
.header-right {
    font-weight: 600;
}

/* ===== Combatant list ===== */
.list {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

/* One row */
.row {
    display: flex;
    align-items: center;
    gap: 4px;
}

/* Left: name + job */
.row-left {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 4px;
}

/* Job tag */
.job-tag {
    padding: 1px 4px;
    border-radius: 2px;
    font-size: 10px;
    background: rgba(255, 255, 255, 0.08);
    color: #e5e5e5;
}

/* Name text */
.name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Right: bar + DPS number */
.row-right {
    width: 120px;
    position: relative;
    height: 14px;
    display: flex;
    align-items: center;
    padding: 0 3px;
    background: rgba(30, 30, 30, 0.9);
    border-radius: 2px;
}

/* Colored bar */
.bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 0;
    background: var(--job-color, #888888);
    border-radius: 2px;
    transition: width 0.15s ease-out;
}

/* DPS text */
.dps-text {
    position: relative;
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    text-shadow: 0 0 2px #000;
}

/* Small label under DPS (optional) */
.dps-label {
    font-size: 9px;
    opacity: 0.8;
    margin-left: 2px;
}

/* ===== Empty / waiting text ===== */
#empty {
    font-size: 11px;
    color: #bbbbbb;
    opacity: 0.8;
    margin-top: 2px;
}
</style>
</head>
<body>

<div id="root">
    <div class="header">
        <div class="header-left" id="encounter-name">No Encounter</div>
        <div class="header-right" id="encounter-dps">0 DPS</div>
    </div>
    <div class="list" id="list">
        <!-- Placeholder row so it never looks blank -->
        <div class="row">
            <div class="row-left">
                <div class="job-tag">SAM</div>
                <div class="name">Test Player</div>
            </div>
            <div class="row-right">
                <div class="bar" style="--job-color:#ef4444; width:60%;"></div>
                <div class="dps-text">5000<span class="dps-label"> DPS</span></div>
            </div>
        </div>
    </div>
    <div id="empty" style="display:none;">Waiting for data…</div>
</div>

<script>
/* ===== Job color map (Skyline-like) ===== */
const JOB_COLORS = {
    PLD: "#3b82f6", WAR: "#3b82f6", DRK: "#3b82f6", GNB: "#3b82f6",
    WHM: "#22c55e", SCH: "#22c55e", AST: "#22c55e", SGE: "#22c55e",
    MNK: "#ef4444", DRG: "#ef4444", NIN: "#ef4444", SAM: "#ef4444",
    RPR: "#ef4444", VPR: "#ef4444", BRD: "#ef4444", MCH: "#ef4444",
    DNC: "#ef4444", BLM: "#ef4444", SMN: "#ef4444", RDM: "#ef4444",
    PCT: "#ef4444"
};

/* ===== WebSocket connection =====
   Use wss:// for GitHub Pages (https origin) */
let ws;
(function connect() {
    try {
        ws = new WebSocket("wss://127.0.0.1:10501/overlay");
        ws.onopen = () => console.log("Overlay WS connected");
        ws.onclose = () => {
            console.log("Overlay WS closed, retrying in 5s");
            setTimeout(connect, 5000);
        };
        ws.onerror = () => {
            console.log("Overlay WS error");
        };
        ws.onmessage = (ev) => {
            const msg = JSON.parse(ev.data);
            if (msg.type === "CombatData") {
                updateOverlay(msg);
            }
        };
    } catch (e) {
        console.log("WS init failed", e);
    }
})();

/* ===== Update overlay from ACT data ===== */
function updateOverlay(data) {
    const encounter = data.Encounter || {};
    const combatants = data.Combatant || {};

    const encName = encounter.title || "Encounter";
    const encDps = parseFloat(encounter.encdps) || 0;

    document.getElementById("encounter-name").textContent = encName;
    document.getElementById("encounter-dps").textContent = `${Math.round(encDps)} DPS`;

    const listEl = document.getElementById("list");
    listEl.innerHTML = "";

    const entries = Object.entries(combatants);
    if (!entries.length) {
        document.getElementById("empty").style.display = "block";
        return;
    } else {
        document.getElementById("empty").style.display = "none";
    }

    // Sort by DPS descending (Skyline-like)
    entries.sort(([, a], [, b]) => {
        const da = parseFloat(a.encdps) || 0;
        const db = parseFloat(b.encdps) || 0;
        return db - da;
    });

    const totalDps = encDps > 0 ? encDps : entries.reduce((sum, [, c]) => sum + (parseFloat(c.encdps) || 0), 0);

    entries.forEach(([name, c]) => {
        const dps = parseFloat(c.encdps) || 0;
        const pct = totalDps > 0 ? Math.min(dps / totalDps, 1) : 0;
        const job = c.Job || "";
        const color = JOB_COLORS[job] || "#888888";

        const row = document.createElement("div");
        row.className = "row";

        const left = document.createElement("div");
        left.className = "row-left";

        const jobTag = document.createElement("div");
        jobTag.className = "job-tag";
        jobTag.textContent = job || "?";

        const nameEl = document.createElement("div");
        nameEl.className = "name";
        nameEl.textContent = name;

        left.appendChild(jobTag);
        left.appendChild(nameEl);

        const right = document.createElement("div");
        right.className = "row-right";

        const bar = document.createElement("div");
        bar.className = "bar";
        bar.style.setProperty("--job-color", color);
        bar.style.width = (pct * 100).toFixed(1) + "%";

        const dpsText = document.createElement("div");
        dpsText.className = "dps-text";
        dpsText.innerHTML = `${Math.round(dps)}<span class="dps-label"> DPS</span>`;

        right.appendChild(bar);
        right.appendChild(dpsText);

        row.appendChild(left);
        row.appendChild(right);

        listEl.appendChild(row);
    });
}
</script>

</body>
</html>
