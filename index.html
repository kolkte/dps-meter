/* ===========================
   GLOBAL
   =========================== */
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: "Google Sans Flex", Inter, "Noto Sans JP", sans-serif;
  color: #fff;
  font-size: 12px;
}

#root {
  display: flex;
  justify-content: center;
  padding: 6px;
}

.app {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* ===========================
   ENCOUNTER HEADER
   =========================== */
.encounter {
  width: 120px;
  max-width: 120px;
  margin: 40px auto 0 auto;
  position: relative;
  overflow: visible;
}

.encounter-duration {
  font-size: 10px;
  opacity: 0.8;
  margin-bottom: 2px;
}

.encounter-content-zone > span {
  display: none !important;
}

.encounter-content-numbers {
  position: absolute;
  bottom: 100%;
  left: 0;
  width: 120px;
  background: rgba(145,145,145,0.5);
  padding: 2px 6px;
  border-radius: 0;
  white-space: nowrap;
  font-size: 16px;
  font-weight: bold;
  pointer-events: none;
  display: flex;
  gap: 4px;
}

/* ===========================
   COMBATANT LIST
   =========================== */
.combatants {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

/* ===========================
   COMBATANT ROW
   =========================== */
.combatant {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
}

/* Name on the right */
.combatant-name {
  order: 2;
  white-space: nowrap;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 120px bar block */
.combatant-content {
  order: 1;
  width: 120px;
  min-width: 120px;
  max-width: 120px;

  display: flex;
  flex-direction: row;
  align-items: center;

  padding: 2px 4px;
  border-radius: 0;
  position: relative;
  overflow: hidden;
  white-space: nowrap;
}

/* Job icon inside bar */
.job-icon {
  flex: 0 0 auto;
  margin-right: 4px;
  display: flex;
  align-items: center;
}

/* DPS number + DPS text */
.combatant-content-data {
  display: flex;
  flex-direction: row;
  width: 100%;
  align-items: flex-end;
}

.g-number {
  margin-left: auto;
  margin-right: 2px;
  font-weight: 600;
}

.g-counter {
  font-size: 10px;
  opacity: 0.9;
}

/* No ticker, no max-hit */
.s-ticker,
.combatant-bottom {
  display: none !important;
}

   BAR FILL
