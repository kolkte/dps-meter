<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Skyline Custom Overlay</title>
<style>

/* ===========================
   GLOBAL STYLES
   =========================== */

body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: sans-serif;
    color: white;
}

/* Container for the whole meter */
#meter {
    width: 120px;
    margin: 0 auto;
    position: relative;
}

/* ===========================
   TOP DPS NUMBER
   =========================== */

#encounter-dps {
    position: absolute;
    bottom: 100%;
    left: 0;
    width: 120px;
    background: rgba(40,40,40,0.9);
    padding: 2px 6px;
    font-size: 16px;
    font-weight: bold;
    white-space: nowrap;
}

/* ===========================
   PLAYER ROWS
   =========================== */

.combatant {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
}

/* 120px block containing bar + numbers */
.combatant-content {
    width: 120px;
    min-width: 120px;
    max-width: 120px;

    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;

    padding: 2px 4px;
    border-radius: 0;
    white-space: nowrap;

    position: relative;
}

/* The job‑color bar (dynamic width) */
.combatant-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;

    background: var(--job-color, gray);
    width: 0px; /* JS will update this */
    z-index: 1;
}

/* DPS number + "DPS" text */
.combatant-content-data {
    display: flex;
    flex-direction: row;
    width: 100%;
    align-items: flex-end;
    z-index: 2; /* above bar */
}

.combatant-content-data .g-number {
    margin-left: auto;
    margin-right: 2px;
}

.combatant-content-data .g-counter {
    margin-left: 0;
    position: relative;
    top: 0px;
}

/* Player name */
.combatant-name {
    white-space: nowrap;
}

</style>
</head>
<body>

<div id="meter">
    <div id="encounter-dps">0 DPS</div>
    <div id="combatants"></div>
</div>

<script>
/* ============================================
   CONNECT TO ACT WS SERVER
   ============================================ */

const ws = new WebSocket("ws://127.0.0.1:10501/overlay");

ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if (data.type === "CombatData") {
        updateOverlay(data);
    }
};

/* ============================================
   UPDATE OVERLAY
   ============================================ */

function updateOverlay(data) {
    const encounter = data.Encounter;
    const combatants = data.Combatant;

    const totalDPS = parseFloat(encounter.encdps) || 0;

    // Update top DPS
    document.getElementById("encounter-dps").textContent =
        `${Math.round(totalDPS)} DPS`;

    const container = document.getElementById("combatants");
    container.innerHTML = "";

    // Build each row
    Object.entries(combatants).forEach(([name, c]) => {
        const dps = parseFloat(c.encdps) || 0;
        const pct = totalDPS > 0 ? Math.min(dps / totalDPS, 1) : 0;

        // Determine job color (Skyline style)
        const jobColor = c.Job || "DPS";
        const colorMap = {
            "PLD": "#3b82f6", "WAR": "#3b82f6", "DRK": "#3b82f6", "GNB": "#3b82f6",
            "WHM": "#22c55e", "SCH": "#22c55e", "AST": "#22c55e", "SGE": "#22c55e",
            "MNK": "#ef4444", "DRG": "#ef4444", "NIN": "#ef4444", "SAM": "#ef4444",
            "RPR": "#ef4444", "VPR": "#ef4444", "BRD": "#ef4444", "MCH": "#ef4444",
            "DNC": "#ef4444", "BLM": "#ef4444", "SMN": "#ef4444", "RDM": "#ef4444",
            "PCT": "#ef4444"
        };

        const row = document.createElement("div");
        row.className = "combatant";

        const content = document.createElement("div");
        content.className = "combatant-content";
        content.style.setProperty("--job-color", colorMap[jobColor] || "gray");

        const bar = document.createElement("div");
        bar.className = "combatant-bar";
        bar.style.width = `${pct * 120}px`;

        const dataBox = document.createElement("div");
        dataBox.className = "combatant-content-data";

        const num = document.createElement("span");
        num.className = "g-number";
        num.textContent = Math.round(dps);

        const counter = document.createElement("span");
        counter.className = "g-counter";
        counter.textContent = "DPS";

        dataBox.appendChild(num);
        dataBox.appendChild(counter);

        content.appendChild(bar);
        content.appendChild(dataBox);

        const nameBox = document.createElement("div");
        nameBox.className = "combatant-name";
        nameBox.textContent = name;

        row.appendChild(content);
        row.appendChild(nameBox);

        container.appendChild(row);
    });
}
</script>

</body>
</html>
